# .github/workflows/ci.yml

name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci-backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install deps
        run: uv sync --frozen

      - name: Pyright
        run: uv run pyright src/

      - name: Pytest (unit + API)
        run: uv run pytest tests/ -x -q --ignore=tests/integration

  ci-integration:
    name: Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install deps
        run: uv sync --frozen

      - name: Build sandbox image
        run: docker build -t ml-toolbox-sandbox sandbox/

      - name: Pytest (integration)
        run: uv run pytest tests/integration/ -x -v

  ci-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm tsc --noEmit
